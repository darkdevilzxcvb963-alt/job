services:
  # Python Backend Service
  - type: web
    name: resume-matching-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: resume-matching-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS_STR
        value: https://your-frontend-url.vercel.app  # UPDATE THIS
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app  # UPDATE THIS
      - key: GEMINI_API_KEY
        sync: false  # Add this in Render Dashboard
      - key: OPENAI_API_KEY
        sync: false  # Add this in Render Dashboard

databases:
  - name: resume-matching-db
    plan: free
    postgresMajorVersion: "15"
