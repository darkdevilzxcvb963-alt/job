services:
  # Python Backend Service
  - type: web
    name: resume-matching-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: resume-matching-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS_STR
        value: https://job-matching-frontend-6457.onrender.com,https://job-steel-psi.vercel.app,http://localhost:5173,http://localhost:3000
      - key: FRONTEND_URL
        value: https://job-matching-frontend-6457.onrender.com
      - key: GOOGLE_CLIENT_ID
        value: 747262601374-jqqsardv3q7lfg57a0e1jjup0i7shlvg.apps.googleusercontent.com
      - key: GOOGLE_AUTH_ENABLED
        value: true
      - key: GOOGLE_AUTO_VERIFY
        value: true
      - key: GEMINI_API_KEY
        sync: false  # Add this in Render Dashboard
      - key: OPENAI_API_KEY
        sync: false  # Add this in Render Dashboard

databases:
  - name: resume-matching-db
    plan: free
    postgresMajorVersion: "15"
